<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Resource Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080c14;
      --bg2:       #0d1420;
      --surface:   rgba(255,255,255,0.04);
      --surface2:  rgba(255,255,255,0.07);
      --border:    rgba(255,255,255,0.08);
      --border2:   rgba(255,255,255,0.14);
      --accent:    #3b82f6;
      --accent2:   #06b6d4;
      --accent3:   #8b5cf6;
      --green:     #10b981;
      --text:      #f0f4ff;
      --text2:     #8b9ab5;
      --text3:     #4a5568;
      --radius:    16px;
      --radius-sm: 10px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── ANIMATED BG ── */
    .bg-mesh {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
    }
    .bg-mesh::before {
      content: '';
      position: absolute;
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(59,130,246,0.11) 0%, transparent 65%);
      top: -200px; left: -100px;
      animation: drift1 18s ease-in-out infinite alternate;
    }
    .bg-mesh::after {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(139,92,246,0.09) 0%, transparent 65%);
      bottom: -100px; right: -100px;
      animation: drift2 22s ease-in-out infinite alternate;
    }
    @keyframes drift1 { from{transform:translate(0,0)} to{transform:translate(80px,60px)} }
    @keyframes drift2 { from{transform:translate(0,0)} to{transform:translate(-60px,-80px)} }

    .grid-lines {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 64px 64px;
    }

    /* ── NAVBAR ── */
    nav {
      position: sticky; top: 0; z-index: 200;
      height: 68px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px;
      background: rgba(8,12,20,0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
    }
    .nav-brand { display: flex; align-items: center; gap: 14px; }
    .nav-logo {
      width: 40px; height: 40px;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(59,130,246,0.18), rgba(139,92,246,0.18));
      border: 1px solid rgba(59,130,246,0.25);
      display: grid; place-items: center;
    }
    .nav-wordmark h1 {
      font-size: 15px; font-weight: 700; color: var(--text);
      line-height: 1.2; letter-spacing: -0.3px;
    }
    .nav-wordmark h1 span { font-weight: 300; color: var(--text2); }
    .nav-wordmark p {
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3);
    }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-pill {
      font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
      color: var(--accent2); text-transform: uppercase;
      background: rgba(6,182,212,0.08);
      border: 1px solid rgba(6,182,212,0.2);
      padding: 5px 12px; border-radius: 999px;
    }
    .logout-btn {
      display: flex; align-items: center; gap: 7px;
      font-family: 'Outfit', sans-serif;
      font-size: 13px; font-weight: 500; color: var(--text2);
      background: var(--surface); border: 1px solid var(--border);
      padding: 8px 16px; border-radius: var(--radius-sm);
      cursor: pointer; transition: all 0.2s;
    }
    .logout-btn:hover { background: var(--surface2); border-color: var(--border2); color: var(--text); }

    /* ── HERO ── */
    .hero {
      position: relative; z-index: 1;
      padding: 80px 40px 56px;
      display: flex; flex-direction: column; align-items: center;
      text-align: center;
    }
    .hero-tag {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--accent); background: rgba(59,130,246,0.08);
      border: 1px solid rgba(59,130,246,0.2);
      padding: 6px 16px; border-radius: 999px;
      margin-bottom: 28px;
      animation: fadeDown 0.5s ease both;
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.6)} }

    .hero h2 {
      font-size: clamp(36px, 6vw, 66px);
      font-weight: 800; line-height: 1.05;
      letter-spacing: -2px; color: var(--text);
      margin-bottom: 20px;
      animation: fadeDown 0.5s 0.1s ease both;
    }
    .grad {
      background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .hero-sub {
      font-size: 16px; color: var(--text2);
      max-width: 460px; line-height: 1.65; margin-bottom: 48px;
      animation: fadeDown 0.5s 0.2s ease both;
    }
    @keyframes fadeDown {
      from{opacity:0;transform:translateY(-14px)}
      to{opacity:1;transform:translateY(0)}
    }

    /* ── SEARCH ── */
    .search-wrap {
      width: 100%; max-width: 600px;
      position: relative; margin-bottom: 44px;
      animation: fadeDown 0.5s 0.3s ease both;
    }
    .search-icon {
      position: absolute; left: 20px; top: 50%;
      transform: translateY(-50%); pointer-events: none; color: var(--text3);
    }
    .search-wrap input {
      width: 100%; height: 58px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 14px;
      padding: 0 72px 0 52px;
      font-family: 'Outfit', sans-serif;
      font-size: 15px; color: var(--text);
      outline: none; backdrop-filter: blur(10px);
      transition: border 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .search-wrap input::placeholder { color: var(--text3); }
    .search-wrap input:focus {
      border-color: rgba(59,130,246,0.45);
      background: rgba(255,255,255,0.055);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.1), 0 8px 32px rgba(0,0,0,0.3);
    }
    .search-kbd {
      position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--text3);
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      padding: 3px 8px; border-radius: 6px;
    }

    /* ── CATEGORIES ── */
    .categories {
      display: flex; gap: 14px; flex-wrap: wrap;
      justify-content: center;
      width: 100%; max-width: 860px;
      margin-bottom: 64px;
      animation: fadeDown 0.5s 0.4s ease both;
    }
    .cat-btn {
      flex: 1; min-width: 210px; max-width: 260px;
      display: flex; align-items: center; gap: 14px;
      padding: 18px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
      font-family: 'Outfit', sans-serif;
      position: relative; overflow: hidden;
      backdrop-filter: blur(10px);
    }
    .cat-btn::after {
      content: ''; position: absolute; inset: 0;
      opacity: 0; transition: opacity 0.25s; border-radius: inherit;
    }
    .cat-btn.gh-btn::after  { background: linear-gradient(135deg, rgba(139,92,246,0.07), transparent); }
    .cat-btn.rp-btn::after  { background: linear-gradient(135deg, rgba(16,185,129,0.07), transparent); }
    .cat-btn.int-btn::after { background: linear-gradient(135deg, rgba(59,130,246,0.07), transparent); }
    .cat-btn:hover { border-color: var(--border2); transform: translateY(-3px); box-shadow: 0 16px 40px rgba(0,0,0,0.4); }
    .cat-btn:hover::after { opacity: 1; }

    .cat-btn.active { transform: translateY(-3px); }
    .cat-btn.active.gh-btn  { border-color: rgba(139,92,246,0.45); box-shadow: 0 0 0 1px rgba(139,92,246,0.15), 0 16px 40px rgba(139,92,246,0.12); background: rgba(139,92,246,0.06); }
    .cat-btn.active.rp-btn  { border-color: rgba(16,185,129,0.45);  box-shadow: 0 0 0 1px rgba(16,185,129,0.15),  0 16px 40px rgba(16,185,129,0.12);  background: rgba(16,185,129,0.06); }
    .cat-btn.active.int-btn { border-color: rgba(59,130,246,0.45);  box-shadow: 0 0 0 1px rgba(59,130,246,0.15),  0 16px 40px rgba(59,130,246,0.12);  background: rgba(59,130,246,0.06); }

    .cat-icon {
      width: 44px; height: 44px; flex-shrink: 0;
      border-radius: 12px; display: grid; place-items: center;
    }
    .cat-icon.gh  { background: rgba(139,92,246,0.13); border: 1px solid rgba(139,92,246,0.2); }
    .cat-icon.rp  { background: rgba(16,185,129,0.13);  border: 1px solid rgba(16,185,129,0.2); }
    .cat-icon.int { background: rgba(59,130,246,0.13);  border: 1px solid rgba(59,130,246,0.2); }

    .cat-text { text-align: left; }
    .cat-text strong { display: block; font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .cat-text span   { font-size: 11px; color: var(--text2); }
    .cat-arrow { margin-left: auto; color: var(--text3); flex-shrink: 0; transition: transform 0.2s, color 0.2s; }
    .cat-btn:hover .cat-arrow, .cat-btn.active .cat-arrow { transform: translateX(3px); color: var(--text2); }

    /* ── RESULTS ── */
    #results-area {
      position: relative; z-index: 1;
      width: 100%; max-width: 900px;
      margin: 0 auto; padding: 0 40px 80px;
    }

    .results-header {
      display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
    }
    .rh-label { font-size: 11px; font-weight: 600; letter-spacing: 0.09em; text-transform: uppercase; color: var(--text2); }
    .rh-count {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      color: var(--accent); background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.2);
      padding: 2px 10px; border-radius: 999px;
    }
    .results-header::after { content:''; flex:1; height:1px; background: var(--border); }

    /* empty */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      gap: 16px; padding: 80px 20px; text-align: center;
    }
    .empty-icon-wrap {
      width: 72px; height: 72px; border-radius: 20px;
      background: var(--surface); border: 1px solid var(--border);
      display: grid; place-items: center; position: relative;
    }
    .empty-icon-wrap::before {
      content:''; position:absolute; inset:-1px; border-radius:inherit; z-index:-1;
      background: linear-gradient(135deg, rgba(59,130,246,0.25), transparent, rgba(139,92,246,0.25));
    }
    .empty-state h3 { font-size: 20px; font-weight: 700; color: var(--text); }
    .empty-state p  { font-size: 14px; color: var(--text2); max-width: 300px; line-height: 1.6; }

    /* loading */
    .loading-wrap { display:flex; flex-direction:column; align-items:center; gap:16px; padding:60px 20px; }
    .spinner {
      width:34px; height:34px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to{transform:rotate(360deg)} }
    .loading-wrap p { font-size:13px; color:var(--text2); }

    /* error */
    .error-box {
      background: rgba(239,68,68,0.07); border: 1px solid rgba(239,68,68,0.2);
      border-radius: var(--radius); padding: 20px 24px;
      font-size: 13px; color: #fca5a5;
      display: flex; align-items: center; gap: 12px;
    }

    /* grid */
    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    /* card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      backdrop-filter: blur(10px);
      position: relative; overflow: hidden;
      transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
      animation: cardIn 0.4s ease both;
      display: flex; flex-direction: column; gap: 9px;
    }
    @keyframes cardIn {
      from{opacity:0;transform:translateY(18px) scale(0.97)}
      to{opacity:1;transform:translateY(0) scale(1)}
    }
    .card:hover {
      border-color: var(--border2); background: var(--surface2);
      transform: translateY(-4px); box-shadow: 0 20px 48px rgba(0,0,0,0.5);
    }
    .card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:2px; border-radius:var(--radius) var(--radius) 0 0;
    }
    .card.github::before { background: linear-gradient(90deg,#8b5cf6,#a78bfa); }
    .card.paper::before  { background: linear-gradient(90deg,#10b981,#34d399); }
    .card.intern::before { background: linear-gradient(90deg,#3b82f6,#60a5fa); }

    .card-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 3px 9px; border-radius: 999px; width: fit-content;
    }
    .card.github .card-badge { color: #a78bfa; background: rgba(139,92,246,0.12); border: 1px solid rgba(139,92,246,0.2); }
    .card.paper  .card-badge { color: #34d399; background: rgba(16,185,129,0.12);  border: 1px solid rgba(16,185,129,0.2); }
    .card.intern .card-badge { color: #60a5fa; background: rgba(59,130,246,0.12);  border: 1px solid rgba(59,130,246,0.2); }

    .card h3 { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.45; }
    .card .card-sub {
      font-size: 12px; color: var(--text2); font-weight: 500;
      display: flex; align-items: center; gap: 6px;
    }
    .card .card-sub::before { content:''; width:3px; height:3px; border-radius:50%; background:var(--text3); flex-shrink:0; }
    .card .card-snippet {
      font-size: 12px; color: var(--text2); line-height: 1.6;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .stars-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #fbbf24;
      background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.15);
      padding: 2px 8px; border-radius: 999px; width: fit-content;
    }
    .card-footer { margin-top: auto; padding-top: 10px; border-top: 1px solid var(--border); }
    .card a {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 600; color: var(--accent); text-decoration: none;
      transition: gap 0.2s, filter 0.2s;
    }
    .card.paper  a { color: var(--green); }
    .card.intern a { color: #60a5fa; }
    .card a:hover { gap: 9px; filter: brightness(1.2); }

    @media (max-width: 640px) {
      nav { padding: 0 20px; }
      .nav-pill { display: none; }
      .hero { padding: 48px 20px 36px; }
      .categories { flex-direction: column; align-items: stretch; }
      .cat-btn { max-width: 100%; }
      #results-area { padding: 0 20px 60px; }
    }
  </style>
</head>
<body>

<div class="bg-mesh"></div>
<div class="grid-lines"></div>

<!-- NAVBAR -->
<nav>
  <div class="nav-brand">
    <div class="nav-logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
    </div>
    <div class="nav-wordmark">
      <h1><strong>Student</strong><span> Resource Hub</span></h1>
      <p>Educational Discovery</p>
    </div>
  </div>
  <div class="nav-right">
    <div class="nav-pill">✦ Curated APIs</div>
    <button class="logout-btn" onclick="logout()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Logout
    </button>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-tag"><span class="dot"></span>Powered by live data</div>
  <h2>Discover<br/><span class="grad">learning resources</span></h2>
  <p class="hero-sub">Search GitHub repos, academic papers, and internship listings — all in one intelligent hub.</p>

  <!-- SEARCH -->
  <div class="search-wrap">
    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="keyword" placeholder="Try 'Machine Learning', 'Web Development'..." autocomplete="off"/>
    <span class="search-kbd">↵ Enter</span>
  </div>

  <!-- CATEGORIES -->
  <div class="categories">
    <button class="cat-btn gh-btn" id="btn-github" onclick="selectCategory('github')">
      <div class="cat-icon gh">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2">
          <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
        </svg>
      </div>
      <div class="cat-text"><strong>GitHub Repos</strong><span>Open-source code</span></div>
      <svg class="cat-arrow" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </button>

    <button class="cat-btn rp-btn" id="btn-papers" onclick="selectCategory('academics')">
      <div class="cat-icon rp">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="2">
          <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
          <path d="M6 12v5c3 3 9 3 12 0v-5"/>
        </svg>
      </div>
      <div class="cat-text"><strong>Research Papers</strong><span>Academic journals</span></div>
      <svg class="cat-arrow" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </button>

    <button class="cat-btn int-btn" id="btn-internships" onclick="selectCategory('internships')">
      <div class="cat-icon int">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2">
          <rect x="2" y="7" width="20" height="14" rx="2"/>
          <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
        </svg>
      </div>
      <div class="cat-text"><strong>Internships</strong><span>Career opportunities</span></div>
      <svg class="cat-arrow" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </button>
  </div>
</div>

<!-- RESULTS -->
<div id="results-area">
  <div class="empty-state">
    <div class="empty-icon-wrap">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="1.5">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
    </div>
    <h3>Start your search</h3>
    <p>Enter a topic above and choose a category to discover resources.</p>
  </div>
</div>

<script>
  let activeCategory = null;

  if (!localStorage.getItem('loggedIn')) {
    // window.location.href = 'login.html';
  }

  function logout() {
    localStorage.removeItem('loggedIn');
    window.location.href = 'login.html';
  }

  const btnMap   = { github:'btn-github', academics:'btn-papers', internships:'btn-internships' };
  const labelMap = { github:'GitHub Repos', academics:'Research Papers', internships:'Internships' };

  function selectCategory(type) {
    if (activeCategory === type) {
      activeCategory = null;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      showEmpty();
      return;
    }
    activeCategory = type;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(btnMap[type]).classList.add('active');

    const kw = document.getElementById('keyword').value.trim();
    if (kw) search(type);
    else showEmpty('Type a keyword and hit Enter, or press Enter after selecting.');
  }

  document.getElementById('keyword').addEventListener('keydown', function(e) {
    if (e.key !== 'Enter') return;
    if (activeCategory) search(activeCategory);
    else showEmpty('Please select a category first — GitHub, Research, or Internships.');
  });

  function showEmpty(msg) {
    document.getElementById('results-area').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon-wrap">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="1.5">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
          </svg>
        </div>
        <h3>Start your search</h3>
        <p>${msg || 'Enter a topic above and choose a category to discover resources.'}</p>
      </div>`;
  }

  async function search(type) {
    const keyword = document.getElementById('keyword').value.trim();
    if (!keyword) { showEmpty('Please enter a search term first.'); return; }

    const area = document.getElementById('results-area');
    area.innerHTML = `
      <div class="loading-wrap">
        <div class="spinner"></div>
        <p>Searching ${labelMap[type]}…</p>
      </div>`;

    try {
      const res  = await fetch(`http://127.0.0.1:5000/search?q=${encodeURIComponent(keyword)}&type=${type}`);
      const data = await res.json();
      area.innerHTML = '';

      if (!data.results || data.results.length === 0) {
        area.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon-wrap">
              <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="1.5">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
            </div>
            <h3>No results found</h3>
            <p>Try a different keyword or switch categories.</p>
          </div>`;
        return;
      }

      const cardClass = type==='github' ? 'github' : type==='academics' ? 'paper' : 'intern';
      const badgeText = type==='github' ? 'GitHub'  : type==='academics' ? 'Paper'  : 'Internship';

      const header = document.createElement('div');
      header.className = 'results-header';
      header.innerHTML = `<span class="rh-label">${labelMap[type]}</span><span class="rh-count">${data.results.length} results</span>`;
      area.appendChild(header);

      const grid = document.createElement('div');
      grid.className = 'results-grid';

      data.results.forEach((item, i) => {
        const title   = item.title  || item.name  || item.role  || 'Untitled';
        const link    = item.link   || item.url   || '#';
        const subtext = item.author || item.company || '';
        const snippet = item.snippet || '';
        const stars   = item.stars !== undefined ? item.stars : null;

        const card = document.createElement('div');
        card.className = `card ${cardClass}`;
        card.style.animationDelay = `${i * 55}ms`;
        card.innerHTML = `
          <div class="card-badge">${badgeText}</div>
          <h3>${title}</h3>
          ${subtext ? `<div class="card-sub">${subtext}</div>` : ''}
          ${snippet  ? `<div class="card-snippet">${snippet}</div>` : ''}
          ${stars !== null ? `<span class="stars-badge">★ ${stars.toLocaleString()}</span>` : ''}
          <div class="card-footer">
            <a href="${link}" target="_blank">
              View resource
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
              </svg>
            </a>
          </div>`;
        grid.appendChild(card);
      });

      area.appendChild(grid);
    } catch (err) {
      document.getElementById('results-area').innerHTML = `
        <div class="error-box">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          Could not connect to backend. Make sure your Flask server is running on <strong>port 5000</strong>.
        </div>`;
    }
  }
</script>
</body>
</html>
