<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Resource Hub</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <header class="header">
        <div class="container header-content">
            <div class="logo-area">
                <div class="logo-icon">
                    <i data-lucide="search"></i>
                </div>
                <div>
                    <h1>Student Resource Hub</h1>
                    <p class="subtitle">EDUCATIONAL RESOURCE DISCOVERY</p>
                </div>
            </div>
            <button id="logoutBtn" class="btn-secondary">
                <i data-lucide="log-out"></i> Logout
            </button>
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <div class="badge">
                <i data-lucide="sparkles"></i> Powered by curated APIs
            </div>
            <h2>Discover learning resources</h2>
            <p>Search across GitHub repos, academic papers, and internship listings.</p>
            
            <div class="search-container">
                <i data-lucide="search" class="search-icon"></i>
                <input type="text" id="searchInput" placeholder="Try 'Machine Learning', 'Web Development'...">
            </div>

            <div class="category-grid" id="categoryGrid">
                <button class="cat-btn" data-type="github" style="--cat-color: 230, 80%, 60%">
                    <div class="cat-icon"><i data-lucide="github"></i></div>
                    <div class="cat-text">
                        <strong>GitHub Repos</strong>
                        <span>Open-source projects</span>
                    </div>
                </button>
                <button class="cat-btn" data-type="academics" style="--cat-color: 160, 70%, 45%">
                    <div class="cat-icon"><i data-lucide="graduation-cap"></i></div>
                    <div class="cat-text">
                        <strong>Research Papers</strong>
                        <span>Academic journals</span>
                    </div>
                </button>
                <button class="cat-btn" data-type="internships" style="--cat-color: 260, 70%, 60%">
                    <div class="cat-icon"><i data-lucide="briefcase"></i></div>
                    <div class="cat-text">
                        <strong>Internships</strong>
                        <span>Career opportunities</span>
                    </div>
                </button>
            </div>
        </section>

        <section id="resultsSection" class="results-area">
            <div id="emptyState" class="status-msg">
                <div class="empty-icon"><i data-lucide="book-open"></i></div>
                <h3>Start your search</h3>
                <p>Choose a category to discover curated resources.</p>
            </div>

            <div id="loadingState" class="status-msg hidden">
                <i data-lucide="loader-2" class="spin"></i>
                <p>Searching resources...</p>
            </div>

            <div id="resultsList"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
