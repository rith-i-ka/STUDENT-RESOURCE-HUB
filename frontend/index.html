<!DOCTYPE html>
<html>

<head>
    <title>All-in-One Scraper</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>🔍 Resource Finder</h1>

    <input type="text" id="keyword" placeholder="Enter keyword...">

    <div class="buttons">
        <button onclick="search('github')">GitHub</button>
        <button onclick="search('academics')">Academics</button>
        <button onclick="search('internships')">Internships</button>
    </div>

    <div id="results"></div>

    <script src="script.js"></script>
</body>

</html>
