<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Student Resource Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0d1117;
  --card:#1c2233;
  --border:#252d42;
  --blue:#4f8ef7;
  --teal:#1ecfb0;
  --pink:#f05a7e;
  --gold:#f5c542;
  --text:#e8ecf4;
  --muted:#6b7799;
  --input:#141929;
}

body.light{
  --bg:#eef1fb;
  --card:#ffffff;
  --border:#cdd5ee;
  --blue:#3a7ce8;
  --teal:#10b89a;
  --pink:#e8456e;
  --gold:#c49010;
  --text:#1a2040;
  --muted:#5a6490;
  --input:#e4e9f7;
}
body.light .blob{opacity:0.08;}
body.light .grid-overlay{background-image:linear-gradient(rgba(58,124,232,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(58,124,232,0.05) 1px,transparent 1px);}
body.light .sep-line{background:linear-gradient(to bottom,transparent,#c0cae0,transparent);}
body.light .field input:focus{background:#f5f8ff;box-shadow:0 0 0 4px rgba(58,124,232,0.10);}
body.light .float-card{box-shadow:0 4px 18px rgba(0,0,0,0.08);}
body.light .field input::placeholder{color:#8892b8;}
body.light .btn-login{box-shadow:0 8px 32px rgba(58,124,232,0.28);}
body.light .btn-glow{
  display:block;
  position:absolute;
  left:50%;transform:translateX(-50%);
  bottom:-22px;
  width:88%;height:56px;
  background:radial-gradient(ellipse at center, rgba(58,124,232,0.28) 0%, rgba(30,207,176,0.14) 55%, transparent 80%);
  border-radius:50%;
  pointer-events:none;
  filter:blur(10px);
}
.btn-glow{display:none;}

html,body{height:100%;overflow:hidden}
body{
  font-family:'Outfit',sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  transition:background 0.35s,color 0.35s;
}

/* ── AMBIENT BG ── */
.bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.blob{position:absolute;border-radius:50%;filter:blur(100px);opacity:0.16;animation:drift 14s ease-in-out infinite alternate;}
.blob1{width:560px;height:560px;background:var(--blue);top:-180px;left:-160px;}
.blob2{width:460px;height:460px;background:var(--teal);bottom:-150px;right:-130px;animation-delay:5s;}
.blob3{width:300px;height:300px;background:var(--pink);top:35%;left:42%;animation-delay:9s;}
@keyframes drift{from{transform:translate(0,0);}to{transform:translate(26px,16px);}}

.grid-overlay{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(79,142,247,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(79,142,247,0.04) 1px,transparent 1px);
  background-size:44px 44px;
}

/* ── THEME TOGGLE — pill slider ── */
.toggle-wrap{
  position:fixed;top:22px;right:26px;z-index:9999;
  display:flex;align-items:center;gap:10px;
  opacity:0;animation:fadeUp 0.5s 0.15s forwards;
  user-select:none;
}

.pill-track{
  width:50px;height:26px;
  border-radius:26px;
  background:linear-gradient(135deg,#4f8ef7,#3a7ce8);
  position:relative;
  cursor:pointer;
  transition:background 0.45s,box-shadow 0.45s;
  box-shadow:0 3px 12px rgba(79,142,247,0.55),0 0 0 2px rgba(79,142,247,0.25);
  flex-shrink:0;
}
body.light .pill-track{
  background:linear-gradient(135deg,#3a7ce8,#2860cc);
  box-shadow:0 3px 12px rgba(58,124,232,0.45),0 0 0 2px rgba(58,124,232,0.2);
}
.pill-thumb{
  position:absolute;
  top:3px;left:3px;
  width:20px;height:20px;
  border-radius:50%;
  background:#fff;
  box-shadow:0 2px 8px rgba(0,0,0,0.22);
  transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  display:flex;align-items:center;justify-content:center;
}
.pill-track.dark .pill-thumb{
  transform:translateX(24px);
}
.pill-track:hover{filter:brightness(1.08);}

/* ── PAGE CARD ── */
.page-card{
  position:relative;z-index:1;
  display:flex;
  width:100%;
  max-width:1180px;
  min-height:620px;
  max-height:96vh;
  background:transparent;
  border-radius:24px;
  overflow:hidden;
}

/* ── LEFT PANEL ── */
.left{
  width:50%;
  display:flex;flex-direction:column;
  padding:44px 52px;
  background:var(--bg);
  position:relative;
}
.sep-line{
  position:absolute;right:0;top:6%;bottom:6%;
  width:1px;
  background:linear-gradient(to bottom,transparent,var(--border),transparent);
  transition:background 0.3s;
}

.brand{display:flex;align-items:center;gap:13px;opacity:0;animation:fadeUp 0.5s 0.2s forwards;}
.brand-logo{
  width:44px;height:44px;
  border:1.5px solid var(--border);border-radius:11px;
  background:var(--card);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 16px rgba(79,142,247,0.14);
  transition:all 0.3s;
}
.brand-logo svg{width:21px;height:21px;color:var(--blue);}
.brand-words h1{font-family:'Playfair Display',serif;font-size:12.5px;font-weight:700;letter-spacing:0.13em;color:var(--text);line-height:1;transition:color 0.3s;}
.brand-words p{font-size:9px;letter-spacing:0.22em;color:var(--muted);text-transform:uppercase;margin-top:4px;transition:color 0.3s;}

.form-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;max-width:400px;}

.headline{
  font-family:'Playfair Display',serif;
  font-size:36px;font-weight:900;line-height:1.12;
  color:var(--text);
  margin-bottom:8px;
  white-space:nowrap;
  opacity:0;animation:fadeUp 0.5s 0.26s forwards;
  transition:color 0.3s;
}
.headline span {
  background: linear-gradient(90deg, var(--blue), var(--teal));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.sub{font-size:13.5px;font-weight:300;color:var(--muted);margin-bottom:30px;opacity:0;animation:fadeUp 0.5s 0.32s forwards;transition:color 0.3s;}

.field{position:relative;margin-bottom:12px;opacity:0;animation:fadeUp 0.5s forwards;}
.field:nth-of-type(1){animation-delay:0.36s;}
.field:nth-of-type(2){animation-delay:0.42s;}
.field-icon{position:absolute;left:17px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;transition:color 0.2s;}
.field-icon svg{width:16px;height:16px;}
.field input{
  width:100%;padding:14px 16px 14px 48px;
  background:var(--input);border:1.5px solid var(--border);border-radius:13px;
  font-family:'Outfit',sans-serif;font-size:14px;color:var(--text);
  outline:none;transition:all 0.25s;
}
.field input::placeholder{color:var(--muted);opacity:0.7;}
.field input:focus{border-color:var(--blue);background:var(--bg);box-shadow:0 0 0 4px rgba(79,142,247,0.12);}
.field:has(input:focus) .field-icon{color:var(--blue);}

.extras{display:flex;align-items:center;justify-content:space-between;margin:4px 0 22px;opacity:0;animation:fadeUp 0.5s 0.48s forwards;}
.remember{display:flex;align-items:center;gap:7px;}
.remember input[type=checkbox]{display:none;}
.chk{width:17px;height:17px;border:1.5px solid var(--border);border-radius:4px;background:var(--input);display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0;}
.remember input[type=checkbox]:checked+.chk{background:var(--blue);border-color:var(--blue);}
.remember input[type=checkbox]:checked+.chk::after{content:'';display:block;width:4px;height:8px;border:2px solid #fff;border-left:none;border-top:none;transform:rotate(45deg) translate(-1px,-1px);}
.remember span{font-size:12.5px;color:var(--muted);transition:color 0.3s;}
.forgot{font-size:12.5px;color:var(--blue);text-decoration:none;}
.forgot:hover{text-decoration:underline;}

.btn-login{
  width:100%;padding:15px;
  background:linear-gradient(135deg,var(--blue),#2d60d4);
  border:none;border-radius:13px;
  font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;
  color:#fff;
  display:flex;align-items:center;justify-content:center;gap:9px;
  position:relative;overflow:hidden;
  transition:transform 0.18s,box-shadow 0.25s;
  box-shadow:0 8px 28px rgba(79,142,247,0.4);
  opacity:0;animation:fadeUp 0.5s 0.54s forwards;
  letter-spacing:0.03em;
}
.btn-login::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.14),transparent);opacity:0;transition:opacity 0.2s;}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 14px 38px rgba(79,142,247,0.52);}
.btn-login:hover::before{opacity:1;}
.btn-login:active{transform:translateY(0);}
.btn-login svg{width:17px;height:17px;}
.login-error{
  font-size:12.5px;color:#f05a7e;text-align:center;
  margin-top:10px;min-height:18px;
  opacity:0;transition:opacity 0.3s;
}
.login-error.show{opacity:1;}

.divider{display:flex;align-items:center;gap:8px;margin:18px 0;opacity:0;animation:fadeUp 0.5s 0.60s forwards;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);transition:background 0.3s;}
.divider span{font-size:11.5px;color:var(--muted);white-space:nowrap;transition:color 0.3s;}

.register{text-align:center;font-size:13px;color:var(--muted);opacity:0;animation:fadeUp 0.5s 0.66s forwards;transition:color 0.3s;}
.register a{color:var(--teal);font-weight:600;text-decoration:none;}
.register a:hover{text-decoration:underline;}

.tags{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:22px;opacity:0;animation:fadeUp 0.5s 0.72s forwards;}
.tag{display:flex;align-items:center;gap:7px;border:1px solid var(--border);border-radius:50px;padding:7px 14px;font-size:12px;font-weight:500;color:var(--muted);background:var(--card);transition:all 0.22s;cursor:default;}
.tag:hover{border-color:var(--blue);color:var(--text);box-shadow:0 0 10px rgba(79,142,247,0.2);}
.tag svg{width:13px;height:13px;}
.tag.teal svg{color:var(--teal);}
.tag.blue svg{color:var(--blue);}
.tag.gold svg{color:var(--gold);}

/* ── RIGHT PANEL ── */
.right{
  width:50%;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  background:var(--bg);
  padding:28px 24px;
}

.orb{position:absolute;border-radius:50%;pointer-events:none;}
.orb1{width:320px;height:320px;background:radial-gradient(circle,rgba(79,142,247,0.15),transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);animation:orbp 7s ease-in-out infinite alternate;}
.orb2{width:200px;height:200px;background:radial-gradient(circle,rgba(30,207,176,0.11),transparent 70%);top:10%;right:10%;}
@keyframes orbp{from{transform:translate(-50%,-50%)scale(1);}to{transform:translate(-50%,-50%)scale(1.1);}}

/* sparkles */
.sp{position:absolute;pointer-events:none;z-index:10;animation:spk 4s ease-in-out infinite alternate;}
@keyframes spk{from{opacity:0.4;transform:scale(1)rotate(0deg);}to{opacity:1;transform:scale(1.5)rotate(25deg);}}
.sp1{top:10%;right:18%;animation-delay:0s;}
.sp2{top:30%;left:8%;animation-delay:1.3s;}
.sp3{bottom:18%;left:14%;animation-delay:2.6s;}
.sp4{bottom:12%;right:12%;animation-delay:0.8s;}
.sp5{top:52%;right:6%;animation-delay:2s;}

/* floating info pills */
.fc{
  position:absolute;
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:9px 14px;
  display:flex;align-items:center;gap:9px;
  font-size:11.5px;font-weight:500;color:var(--text);
  box-shadow:0 6px 28px rgba(0,0,0,0.35);
  animation:floaty 5s ease-in-out infinite alternate;
  white-space:nowrap;transition:background 0.3s,border-color 0.3s,color 0.3s;
  backdrop-filter:blur(8px);
  z-index:10;
}
.fc .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.fc1{top:11%;left:4%;animation-delay:0s;}
.fc2{top:14%;right:3%;animation-delay:1.6s;}
.fc3{bottom:1%;right:8%;animation-delay:0.9s;}
.fc4{bottom:6%;left:8%;animation-delay:2.3s;}
@keyframes floaty{from{transform:translateY(0);}to{transform:translateY(-13px);}}

/* central illustration */
.illus{
  position:relative;z-index:2;
  width:90%;max-width:430px;
  opacity:0;animation:fadeUp 0.9s 0.35s forwards;
}
.illus svg{width:100%;height:auto;display:block;}

@keyframes fadeUp{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}

@media(max-width:900px){
  html,body{height:auto;overflow:auto;}
  .page-card{flex-direction:column;max-height:none;}
  .left,.right{width:100%;}
  .right{display:none;}
  .sep-line{display:none;}
}
</style>
</head>
<body class="light">

<div class="bg">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
</div>
<div class="grid-overlay"></div>

<!-- ══ THEME TOGGLE ══ -->
<div class="toggle-wrap">
  <div class="pill-track" id="pillTrack" onclick="toggleTheme()">
    <div class="pill-thumb" id="pillThumb">
      <svg id="togIcon" viewBox="0 0 24 24" fill="currentColor" stroke="none" style="width:11px;height:11px;display:block;color:#f5c542">
        <path d="M12 17a5 5 0 1 0 0-10 5 5 0 0 0 0 10zm0-13a1 1 0 0 0 1-1V1a1 1 0 0 0-2 0v2a1 1 0 0 0 1 1zm0 16a1 1 0 0 0-1 1v2a1 1 0 0 0 2 0v-2a1 1 0 0 0-1-1zm11-5h-2a1 1 0 0 0 0 2h2a1 1 0 0 0 0-2zM4 12a1 1 0 0 0-1-1H1a1 1 0 0 0 0 2h2a1 1 0 0 0 1-1zm15.07-7.07a1 1 0 0 0-1.41 0l-1.42 1.42a1 1 0 1 0 1.41 1.41l1.42-1.41a1 1 0 0 0 0-1.42zM7.76 17.66l-1.42 1.41a1 1 0 1 0 1.42 1.42l1.41-1.42a1 1 0 1 0-1.41-1.41zm11.32 1.41a1 1 0 1 0 1.41-1.41l-1.41-1.42a1 1 0 1 0-1.42 1.42zM6.34 7.76 4.93 6.34a1 1 0 0 0-1.41 1.42l1.41 1.41a1 1 0 1 0 1.41-1.41z"/>
      </svg>
    </div>
  </div>
</div>

<div class="page-card">

  <!-- ══ LEFT ══ -->
  <div class="left">
    <div class="sep-line"></div>

    <div class="brand">
      <div class="brand-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
      </div>
      <div class="brand-words">
        <h1>STUDENT RESOURCE HUB</h1>
        <p>Educational Resource Discovery</p>
      </div>
    </div>

    <div class="form-wrap">
      <h2 class="headline">Login to your <span>account</span></h2>
      <p class="sub">Access GitHub repos, papers &amp; internships</p>

      <div class="field">
        <div class="field-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <input id="inputUser" type="text" placeholder="Username"/>
      </div>

      <div class="field">
        <div class="field-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <input id="inputPass" type="password" placeholder="Password"/>
      </div>

      <div class="extras">
        <label class="remember">
          <input type="checkbox"/>
          <div class="chk"></div>
          <span>Remember me</span>
        </label>
        <a href="#" class="forgot">Forgot password?</a>
      </div>

      <div style="position:relative;">
        <button class="btn-login" onclick="handleLogin()">
          Login
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
        <span class="btn-glow"></span>
        <p id="loginError" class="login-error"></p>
      </div>

      <div class="divider"><span>or continue with</span></div>
      <p class="register">Don't have an account? <a href="signup.html">Create one</a></p>

      <div class="tags">
        <div class="tag gold">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.73.5.5 5.73.5 12c0 5.08 3.29 9.38 7.86 10.9.57.1.78-.25.78-.55v-1.93c-3.2.7-3.87-1.54-3.87-1.54-.52-1.33-1.27-1.68-1.27-1.68-1.04-.71.08-.7.08-.7 1.15.08 1.75 1.18 1.75 1.18 1.02 1.74 2.67 1.24 3.32.95.1-.74.4-1.24.72-1.53-2.55-.29-5.23-1.28-5.23-5.68 0-1.25.45-2.28 1.18-3.08-.12-.29-.51-1.46.11-3.04 0 0 .96-.31 3.15 1.18A10.98 10.98 0 0 1 12 6.84c.97 0 1.95.13 2.86.38 2.18-1.49 3.14-1.18 3.14-1.18.62 1.58.23 2.75.11 3.04.74.8 1.18 1.83 1.18 3.08 0 4.41-2.69 5.38-5.25 5.66.41.36.78 1.07.78 2.15v3.19c0 .3.2.66.79.55C20.21 21.38 23.5 17.08 23.5 12 23.5 5.73 18.27.5 12 .5z"/></svg>
          GitHub Repos
        </div>
        <div class="tag teal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
          Research Papers
        </div>
        <div class="tag blue">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="7" width="20" height="14" rx="2"/>
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
          </svg>
          Internships
        </div>
      </div>
    </div>
  </div>

  <!-- ══ RIGHT ══ -->
  <div class="right">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>

    <!-- sparkles -->
    <div class="sp sp1"><svg width="13" height="13" viewBox="0 0 14 14"><path d="M7 0L8.2 5.8 14 7l-5.8 1.2L7 14 5.8 8.2 0 7l5.8-1.2Z" fill="#f5c542"/></svg></div>
    <div class="sp sp2"><svg width="9" height="9" viewBox="0 0 14 14"><path d="M7 0L8.2 5.8 14 7l-5.8 1.2L7 14 5.8 8.2 0 7l5.8-1.2Z" fill="#f05a7e"/></svg></div>
    <div class="sp sp3"><svg width="11" height="11" viewBox="0 0 14 14"><path d="M7 0L8.2 5.8 14 7l-5.8 1.2L7 14 5.8 8.2 0 7l5.8-1.2Z" fill="#4f8ef7"/></svg></div>
    <div class="sp sp4"><svg width="9" height="9" viewBox="0 0 14 14"><path d="M7 0L8.2 5.8 14 7l-5.8 1.2L7 14 5.8 8.2 0 7l5.8-1.2Z" fill="#1ecfb0"/></svg></div>
    <div class="sp sp5"><svg width="7" height="7" viewBox="0 0 14 14"><path d="M7 0L8.2 5.8 14 7l-5.8 1.2L7 14 5.8 8.2 0 7l5.8-1.2Z" fill="#f5c542"/></svg></div>

    <!-- floating pills -->
    <div class="fc fc1"><div class="dot" style="background:#1ecfb0"></div>2,400+ GitHub Repos</div>
    <div class="fc fc2"><div class="dot" style="background:#4f8ef7"></div>Research Papers</div>
    <div class="fc fc3"><div class="dot" style="background:#f05a7e"></div>500+ Internships</div>
    <div class="fc fc4"><div class="dot" style="background:#f5c542"></div>Live Updates</div>

    <!-- ══ ILLUSTRATION — clean desk scene ══ -->
    <div class="illus">
      <svg viewBox="0 0 500 480" xmlns="http://www.w3.org/2000/svg" fill="none">
        <defs>
          <radialGradient id="rg1" cx="50%" cy="55%" r="50%">
            <stop offset="0%" stop-color="#4f8ef7" stop-opacity="0.2"/>

<script>
  function handleLogin() {
  const user = document.getElementById('inputUser').value.trim();
  const pass = document.getElementById('inputPass').value.trim();
  const err  = document.getElementById('loginError');

  if (!user || !pass) {
    showError("Enter username and password");
    return;
  }

  // get stored user
  const storedUser = JSON.parse(localStorage.getItem("user"));

  if (!storedUser) {
    showError("No account found. Please sign up.");
    return;
  }

  // validate
  if (user === storedUser.username && pass === storedUser.password) {
    localStorage.setItem("loggedIn", "true");
    window.location.href = "index.html";
  } else {
    showError("Invalid username or password");
  }
}
  function showError(msg) {
    const err = document.getElementById('loginError');
    err.textContent = msg;
    err.classList.add('show');
  }

  function toggleTheme() {
    isLight = !isLight;
    const track = document.getElementById('pillTrack');
    const icon = document.getElementById('togIcon');
    if (isLight) {
      document.body.classList.add('light');
      track.classList.remove('dark');
      icon.setAttribute('fill','currentColor');
      icon.setAttribute('stroke','none');
      icon.innerHTML = SUN;
      icon.style.color = '#f5c542';

      document.body.classList.remove('light');

      icon.setAttribute('fill','currentColor');
      icon.setAttribute('stroke','none');
      icon.innerHTML = MOON;
      icon.style.color = '#f5c542';

  }
